# ─── GRUB 2 Configuration — Exo-OS ───────────────────────────────────────────
# Bootloader Multiboot2 → kernel ELF chargé depuis /boot/exo-os-kernel
# Entrée par défaut : menu 0, timeout 5 secondes.

set default=0
set timeout=5

# ── Sortie visible par défaut ─────────────────────────────────────────────────
# Rester en console BIOS/VGA texte. Le framebuffer graphique sera réactivé plus
# tard quand le noyau pourra le mapper et le piloter lui-même.
terminal_output console
set gfxpayload=text

# ── Menu principal ────────────────────────────────────────────────────────────
menuentry "Exo-OS v0.1.0" --class os --class gnu-linux {
    # Chemin visible par défaut : rester en VGA texte 80x25.
    # Sous VirtualBox, cela évite l'écran noir si le framebuffer n'est
    # pas encore attaché par le noyau.
    terminal_output console
    set gfxpayload=text
    # Charge le kernel ELF avec le protocole Multiboot2.
    # GRUB met EAX=0x36d76289, EBX=adresse structure info → kernel_main(mb2_magic, mb2_info, 0)
    multiboot2 /boot/exo-os-kernel
    boot
}

menuentry "Exo-OS v0.1.0 (VirtualBox / texte)" --class os {
    # VirtualBox peut conserver le shell GRUB en mode graphique sans fournir
    # de framebuffer Multiboot2 exploitable au noyau. Cette entrée force le
    # fallback texte pour rendre visible la progression VGA 80x25.
    terminal_output console
    set gfxpayload=text
    multiboot2 /boot/exo-os-kernel
    boot
}

menuentry "Exo-OS v0.1.0 (sortie serie)" --class os {
    multiboot2 /boot/exo-os-kernel console=ttyS0
    boot
}
