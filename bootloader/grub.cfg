# ─── GRUB 2 Configuration — Exo-OS ───────────────────────────────────────────
# Bootloader Multiboot2 → kernel ELF chargé depuis /boot/exo-os-kernel
# Entrée par défaut : menu 0, timeout 3 secondes.

set default=0
set timeout=3

# ── Support graphique (optionnel — dégradation transparente si non disponible) ─
insmod all_video
insmod vbe
insmod vga
if loadfont /boot/grub/fonts/unicode.pf2 ; then
    insmod gfxterm
    set gfxmode=1024x768,800x600,auto
    terminal_output gfxterm
fi

# ── Menu principal ────────────────────────────────────────────────────────────
menuentry "Exo-OS v0.1.0" --class os --class gnu-linux {
    # Charge le kernel ELF avec le protocole Multiboot2.
    # GRUB met EAX=0x36d76289, EBX=adresse structure info → kernel_main(mb2_magic, mb2_info, 0)
    multiboot2 /boot/exo-os-kernel
    boot
}

menuentry "Exo-OS v0.1.0 (sortie serie)" --class os {
    multiboot2 /boot/exo-os-kernel console=ttyS0
    boot
}
