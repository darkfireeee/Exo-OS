[graph]
targets = [
    { triple = "x86_64-unknown-none" },
]

[advisories]
unmaintained = "all"
unsound = "workspace"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "libsodium-sys", reason = "FFI C dependency is not allowed in the Exo-OS kernel/server base; use RustCrypto or an audited no_std path" },
    { name = "libsodium", reason = "Use the audited ExoOS/RustCrypto path instead" },
    { name = "openssl", reason = "Use the audited ExoOS/RustCrypto path instead" },
    { name = "ring", reason = "Requires explicit evaluation before being allowed in ExoOS" },
    { name = "dbus", reason = "D-Bus is incompatible with the Exo-OS IPC model" },
    { name = "zbus", reason = "D-Bus is incompatible with the Exo-OS IPC model" },
    { name = "tokio", version = "*", reason = "Tokio runtime is not part of the Exo-OS runtime contract" },
    { name = "tokio-runtime", reason = "Tokio runtime is not part of the Exo-OS runtime contract" },
    { name = "async-std", reason = "async-std is redundant with the Exo-OS runtime model" },
    { name = "systemd", reason = "systemd is incompatible with the Exo-OS boot and service model" },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
