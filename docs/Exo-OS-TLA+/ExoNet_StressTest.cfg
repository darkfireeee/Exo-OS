\* ============================================================
\* ExoNet_StressTest.cfg — Profil 1 : BFS exhaustif (recommandé)
\* Constants choisis pour espace d'états fini et gérable.
\* ============================================================

SPECIFICATION Spec

CONSTANTS
    POOL_SIZE   = 6
    RING_SIZE   = 3
    MAX_SOCKETS = 2
    MAX_BURST   = 2
    BATCH_SIZE  = 2

INVARIANTS
    TypeOK
    Safety_NoDoubleRxUse
    Safety_NoRxBufferLeak
    Safety_NoDoubleTxUse
    Safety_NoTxBufferLeak
    Safety_NoTrafficBeforeBoot
    Safety_SocketBound

PROPERTIES
    Liveness_RxDelivery
    Liveness_TxCompletion
    Liveness_RxRefill
    Liveness_PhoenixCompletes
    Liveness_TxPoolRecovery
    Phoenix_DrainCompleteness

CHECK_DEADLOCK TRUE