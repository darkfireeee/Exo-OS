\* ============================================================
\* ExoNet_StressTest_Sim.cfg — Profil 2 : Simulation grande échelle
\* Pour POOL_SIZE=32, RING_SIZE=16 (paramètres réels ExoOS)
\*
\* Commande :
\*   java -Xmx4g -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
\*     -simulate -depth 500 -workers auto \
\*     -config ExoNet_StressTest_Sim.cfg ExoNet_StressTest
\* ============================================================

SPECIFICATION Spec

CONSTANTS
    POOL_SIZE   = 32
    RING_SIZE   = 16
    MAX_SOCKETS = 8
    MAX_BURST   = 8
    BATCH_SIZE  = 4

INVARIANTS
    TypeOK
    Safety_NoDoubleRxUse
    Safety_NoRxBufferLeak
    Safety_NoDoubleTxUse
    Safety_NoTxBufferLeak
    Safety_NoTrafficBeforeBoot
    Safety_SocketBound
    Phoenix_DrainCompleteness

\* Liveness non vérifiée en simulation (WF non supporté par -simulate)
\* Utiliser le profil BFS pour les propriétés de vivacité.

CHECK_DEADLOCK TRUE
