name: ExoOS Audit

on:
  push:
    branches: [main, v0.2.0-stabilisation]
  pull_request:
    branches: [main, v0.2.0-stabilisation]

jobs:
  audit-constants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 tools/audit_constants.py --fail-on-warn

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install semgrep
          semgrep --config tools/semgrep-rules/exoos.yaml --error --timeout 30 \
            exo-boot/src \
            loader/src \
            kernel/src \
            servers \
            userspace

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check all

  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: x86_64-unknown-none,x86_64-unknown-uefi
      - run: |
          cargo check --manifest-path exo-boot/Cargo.toml \
            --target x86_64-unknown-uefi \
            --features "uefi-boot,dev-skip-sig"
          cargo check --manifest-path loader/Cargo.toml --all-targets
          cargo check -p exo-os-kernel \
            -Z build-std=core,alloc,compiler_builtins \
            -Z build-std-features=compiler-builtins-mem \
            --target x86_64-unknown-none
          for manifest in servers/*/Cargo.toml; do
            cargo check --manifest-path "$manifest"
          done
          cargo check --manifest-path userspace/Cargo.toml --workspace --all-targets
