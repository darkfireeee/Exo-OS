# .cargo/config.toml - Configuration globale du workspace Exo-OS
# --------------------------------------------------------------
# Ce fichier centralise la configuration de build pour le noyau et les outils.
# Il force la cible bare-metal et applique des rustflags adaptés OS dev.

[build]
# IMPORTANT: ne PAS forcer de target global au niveau workspace racine.
# Sinon `cargo test` lancé depuis la racine tente de builder tous les membres
# (y compris serveurs std) sur une cible bare-metal no_std, ce qui provoque
# une avalanche d'erreurs (test/std introuvables, macros derive/assert absentes).
# La cible bare-metal est passée explicitement dans les commandes kernel
# (Makefile, run_tests.sh) et/ou dans la config locale `kernel/.cargo/config.toml`.
incremental = true

[target.x86_64-unknown-none]
# Runner optionnel (désactivé par défaut). Vous pouvez décommenter et adapter.
# runner = "pwsh scripts/run-qemu-gui.ps1"

rustflags = [
  # Le script linker est fourni par le build.rs du crate kernel (chemin absolu).
  # Ne pas le mettre ici sans chemin absolu — le linker est invoqué depuis un
  # répertoire temporaire et ne trouverait pas linker.ld sans chemin complet.
  "-C", "link-arg=--no-pie",
  "-C", "link-arg=--allow-multiple-definition",
  "-C", "relocation-model=static",
  "-C", "code-model=kernel",
  "-C", "debuginfo=1",
  # Désactive les extensions CPU non disponibles en contexte kernel bare-metal.
  # sha / aes : SHA-NI et AES-NI génèrent du code SIMD que LLVM ne peut pas baisser
  # pour x86_64-unknown-none (LLVM ERROR: Do not know how to split the operator).
  "-C", "target-feature=-sha,-aes,-avx512f,-avx512bw,-avx512dq,-avx512vl,-avx2,-avx,-pclmulqdq,-sse4.2,-sse4.1,-ssse3,-sse2",
  "--cfg", "curve25519_dalek_backend=\"serial\"",
]

[unstable]
# NOTE: `build-std` est volontairement non défini globalement ici.
# Raison: son activation globale casse la matrice de tests (duplicate core,
# libtest absent selon cible). Les flags build-std sont appliqués uniquement
# sur les builds bare-metal via le Makefile.
panic-abort-tests = true

[env]
# Active la sortie QEMU auto via feature bench_auto_exit si défini != 0
EXO_QEMU_EXIT = "0"

# Pour réduire la verbosité crossbeam en tests éventuels
RUST_LOG = "info"
