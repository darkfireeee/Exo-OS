[package]
name = "exo-fscrypt"
version = "0.1.0"
edition = "2021"
license.workspace = true
publish.workspace = true

# Source UNIQUE de vérité pour la crypto de chiffrement-at-rest ExoFS, partagée
# entre le kernel (no_std, x86_64-unknown-none) et l'outil mkfs (std). Évite toute
# divergence kernel↔outil. N'utilise PAS les crates chacha20/chacha20poly1305
# (incompatibles bare-metal : LLVM split 128-bit) — XChaCha20 en u32 pur, MAC
# BLAKE3, comme le primitif kernel existant.

[lib]
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
blake3 = { workspace = true }
argon2 = { workspace = true }

[features]
default = []
