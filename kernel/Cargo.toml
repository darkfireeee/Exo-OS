[package]
name    = "exo-os-kernel"
version = "0.1.0"
edition = "2021"

# Crate de type bibliothèque — re-exports publics + kernel_init()
[lib]
name    = "exo_os_kernel"
path    = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

# Binaire d'entrée — _start (ASM) → kernel_main() + panic/OOM handlers
[[bin]]
name = "exo-os-kernel"
path = "src/main.rs"

# ── Dépendances (no_std uniquement) ─────────────────────────────────────────

[dependencies]
# Spinlock simple no_std (pour les gardes dans arch/ en attendant scheduler/sync/)
spin     = { version = "0.9", default-features = false, features = ["spin_mutex", "rwlock", "once"] }
bitflags = { version = "2",   default-features = false }

# ── Crypto no_std (RustCrypto — vecteurs IETF, pas d'implémentation from scratch)
# S-08 / LAC-03 / CRYPTO-CRATES : toutes les primitives crypto via crates validées.
# INTERDIT : libsodium (requiert std+libc), ring (trop de deps système)
blake3           = { version = "1",    default-features = false }
hkdf             = { version = "0.12", default-features = false }
sha2             = { version = "0.10", default-features = false, features = ["force-soft"] }   # requis par hkdf — force-soft évite SHA-NI (LLVM crash x86_64-unknown-none)
argon2           = { version = "0.5",  default-features = false, features = ["alloc"] }
siphasher        = { version = "0.3",  default-features = false }
lz4_flex         = { version = "0.11", default-features = false }
# NOTE : chacha20poly1305 supprimé — XChaCha20Poly1305 est implémenté en natif dans
# fs/exofs/crypto/xchacha20.rs (no_std, pas de SIMD, compatible bare-metal x86_64-unknown-none)

# ── Configuration de profil ──────────────────────────────────────────────────

[profile.dev]
# Pas d'optimisation en dev mais pas de débogage avec info trop verbeuse
opt-level     = 0
debug         = true
panic         = "abort"          # pas de stack unwinding en no_std
codegen-units = 1                # Empêche le splitting CGU (256 CGUs par défaut) qui orpheline
                                 # les global_asm! (context_switch_asm, _exo_boot_stack_top)

[profile.release]
opt-level  = 3
lto        = true
panic      = "abort"
codegen-units = 1             # meilleure inlining cross-module
strip      = "none"           # conserver les symboles pour le débogage QEMU/GDB

# ── Cible par défaut (peut être surchargée en ligne de commande) ─────────────

# Utiliser : cargo build --target ../x86_64-exo-os.json -Z build-std=core,alloc
